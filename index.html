<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Duplas Místicas</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #1a0f2e 0%, #07030d 100%);
            --card-bg: rgba(30, 20, 45, 0.65);
            --accent: #ffd700;
            --accent-glow: rgba(255, 215, 0, 0.3);
            --text-color: #f5f2f9;
            --muted-text: #b3a7c4;
            --glass-border: rgba(255, 215, 0, 0.25);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 20px 20px 90px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--accent);
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .subtitle {
            color: var(--muted-text);
            margin-bottom: 35px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .screen {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            transition: all 0.5s ease;
        }

        .hidden {
            display: none !important;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-color);
            border: 2px solid var(--accent);
            padding: 15px 20px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button:hover {
            background: var(--accent);
            color: #07030d;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .tarot-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0;
        }

        .duple-box {
            border: 1px solid rgba(255, 215, 0, 0.15);
            padding: 15px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .duple-title {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* DISEÑO DE CONTENEDOR DE CARTA EN TRES PARTES */
        .card-container {
            margin: 12px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-visual {
            width: 100px;
            height: 160px;
            background-color: #251a36;
            border-radius: 8px;
            border: 2px solid var(--accent);
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: all 0.5s ease;
        }

        /* Reverso místico por defecto */
        .card-visual.back {
            background-image: url('https://i.imgur.com/8N7zX7S.png'); /* Imagen de un reverso místico de cortesía */
        }

        .card-name {
            margin-top: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .reading-output {
            text-align: left;
            margin-top: 25px;
            line-height: 1.7;
        }

        /* ESTILOS PARA LAS SECCIONES QUE DEVUELVE TU SERVER.JS */
        .reading-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }

        .reading-section h3 {
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .voice-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .btn-voice {
            font-size: 0.95rem;
            padding: 12px;
            border-color: #b3a7c4;
            color: #b3a7c4;
        }

        .btn-voice:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.15);
        }

        .back-btn {
            margin-top: 15px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--muted-text);
            color: var(--muted-text);
        }

        .back-btn:hover {
            background: #ff4a4a;
            border-color: #ff4a4a;
            color: white;
            box-shadow: 0 0 15px rgba(255, 74, 74, 0.4);
        }

        .ad-banner-space {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #050308;
            border-top: 1px solid rgba(255, 215, 0, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .ad-placeholder-text {
            color: var(--muted-text);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tarot Sagrado</h1>
    <div class="subtitle">Sistema de Lectura por Duplas</div>

    <div id="screen-selector" class="screen">
        <h3>Selecciona el eje de tu consulta:</h3>
        <div class="theme-selector">
            <button onclick="iniciarLectura('Amor')">❤️ Amor y Relaciones</button>
            <button onclick="iniciarLectura('Negocios')">💼 Negocios y Dinero</button>
            <button onclick="iniciarLectura('General')">🔮 Vida General</button>
        </div>
    </div>

    <div id="screen-result" class="screen hidden">
        <h3 id="reading-theme-title" style="color: var(--accent); margin-top:0;"></h3>
        
        <div class="tarot-table">
            <div class="duple-box">
                <div class="duple-title">Presente y Pasado</div>
                <div class="card-container">
                    <div id="img-a" class="card-visual back"></div>
                    <div id="name-a" class="card-name"></div>
                </div>
                <div class="card-container">
                    <div id="img-b" class="card-visual back"></div>
                    <div id="name-b" class="card-name"></div>
                </div>
            </div>
            
            <div class="duple-box">
                <div class="duple-title">Futuro Cercano</div>
                <div class="card-container">
                    <div id="img-c" class="card-visual back"></div>
                    <div id="name-c" class="card-name"></div>
                </div>
                <div class="card-container">
                    <div id="img-d" class="card-visual back"></div>
                    <div id="name-d" class="card-name"></div>
                </div>
            </div>
        </div>

        <div id="voice-controls" class="voice-panel hidden">
            <button class="btn-voice" onclick="reproducirVoz('todo')">🔊 Leer Todo</button>
            <button class="btn-voice" onclick="reproducirVoz('conclusion')">✨ Solo Conclusión</button>
        </div>

        <div class="reading-output" id="interpretation-text"></div>

        <button class="back-btn" onclick="volverInicio()">Nueva Consulta</button>
    </div>
</div>

<div class="ad-banner-space">
    <div class="ad-placeholder-text">[ Espacio reservado para Publicidad Banner ]</div>
</div>

<script>
    const mazoTarot = [
        "El Loco", "El Mago", "La Sacerdotisa", "La Emperatriz", "El Emperador", 
        "El Papa", "Los Enamorados", "El Carro", "La Fuerza", "El Ermitaño", 
        "La Rueda de la Fortuna", "La Justicia", "El Colgado", "La Muerte", 
        "La Templanza", "El Diablo", "La Torre", "La Estrella", "La Luna", 
        "El Sol", "El Juicio", "El Mundo",
        "As de Bastos", "2 de Bastos", "3 de Bastos", "4 de Bastos", "5 de Bastos", 
        "6 de Bastos", "7 de Bastos", "8 de Bastos", "9 de Bastos", "10 de Bastos", 
        "Sota de Bastos", "Caballero de Bastos", "Reina de Bastos", "Rey de Bastos",
        "As de Copas", "2 de Copas", "3 de Copas", "4 de Copas", "5 de Copas", 
        "6 de Copas", "7 de Copas", "8 de Copas", "9 de Copas", "10 de Copas", 
        "Sota de Copas", "Caballero de Copas", "Reina de Copas", "Rey de Copas",
        "As de Espadas", "2 de Espadas", "3 de Espadas", "4 de Espadas", "5 de Espadas", 
        "6 de Espadas", "7 de Espadas", "8 de Espadas", "9 de Espadas", "10 de Espadas", 
        "Sota de Espadas", "Caballero de Espadas", "Reina de Espadas", "Rey de Espadas",
        "As de Oros", "2 de Oros", "3 de Oros", "4 de Oros", "5 de Oros", 
        "6 de Oros", "7 de Oros", "8 de Oros", "9 de Oros", "10 de Oros", 
        "Sota de Oros", "Caballero de Oros", "Reina de Oros", "Rey de Oros"
    ];

    const SERVIDOR_URL = "https://tarot-613b.onrender.com/tirada"; 
    let contadorLecturas = 0;

    function iniciarLectura(tema) {
        window.speechSynthesis.cancel();
        document.getElementById('voice-controls').classList.add('hidden');

        contadorLecturas++;
        if (contadorLecturas >= 10) {
            alert("🔮 [ANUNCIO A PANTALLA COMPLETA] Aquí saltará tu publicidad de AdMob en la App.");
            contadorLecturas = 0; 
        }

        document.getElementById('screen-selector').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        document.getElementById('reading-theme-title').innerText = `Lectura de ${tema}`;
        document.getElementById('interpretation-text').innerHTML = "<p style='color: var(--accent); text-align:center;'>Conectando con los servidores místicos...</p>";

        // Resetear cartas a boca abajo temporalmente
        ['a', 'b', 'c', 'd'].forEach(id => {
            const el = document.getElementById(`img-${id}`);
            el.style.backgroundImage = "url('https://i.imgur.com/8N7zX7S.png')";
            el.classList.add('back');
            document.getElementById(`name-${id}`).innerText = "Revelando...";
        });

        let mazoMezclado = [...mazoTarot].sort(() => 0.5 - Math.random());
        let cartesElegidas = mazoMezclado.slice(0, 4);
        let [a, b, c, d] = cartesElegidas;

        llamarAlServidorPropio(tema, a, b, c, d);
    }

    async function llamarAlServidorPropio(tema, a, b, c, d) {
        const output = document.getElementById('interpretation-text');

        try {
            const response = await fetch(SERVIDOR_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ tema, a, b, c, d })
            });

            if (!response.ok) throw new Error("Error en el servidor místico.");

            const data = await response.json();
            output.innerHTML = data.lectura;
            
            // MOSTRAR CONTENIDO REAL DE LAS CARTAS (Darlas vuelta)
            mostrarCarta('a', a);
            mostrarCarta('b', b);
            mostrarCarta('c', c);
            mostrarCarta('d', d);

            document.getElementById('voice-controls').classList.remove('hidden');

        } catch (error) {
            console.error(error);
            output.innerHTML = `<p style='color: #ff4a4a; text-align:center;'>Ocurrió un error en la conexión cósmica. Reintentá en unos segundos.</p>`;
        }
    }

    function mostrarCarta(id, nombreCarta) {
        const imgElement = document.getElementById(`img-${id}`);
        const nameElement = document.getElementById(`name-${id}`);
        
        nameElement.innerText = nombreCarta;
        imgElement.classList.remove('back');

        // Convierte el nombre de la carta a minúsculas, saca los acentos y cambia espacios por guiones bajos
        const nombreArchivo = nombreCarta
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "") // Esto elimina tildes por si se escapa alguna
            .replace(/ /g, "_");

        // Le dice a la app que busque la imagen en tu carpeta de GitHub
        imgElement.style.backgroundImage = `url('cartas/${nombreArchivo}.jpg')`;
    }

    function reproducirVoz(tipo) {
        window.speechSynthesis.cancel();
        let textoALeer = "";

        if (tipo === 'todo') {
            textoALeer = document.getElementById('interpretation-text').innerText;
        } else if (tipo === 'conclusion') {
            const elementoConclusion = document.getElementById('conclusion');
            if (elementoConclusion) {
                textoALeer = elementoConclusion.innerText;
            } else {
                const parrafos = document.getElementById('interpretation-text').getElementsByTagName('p');
                if (parrafos.length > 0) textoALeer = parrafos[parrafos.length - 1].innerText;
            }
        }

        if (!textoALeer.trim()) return;

        const mensaje = new SpeechSynthesisUtterance(textoALeer);
        mensaje.lang = 'es-ES';
        mensaje.rate = 0.88; 
        mensaje.pitch = 0.95; 

        window.speechSynthesis.speak(mensaje);
    }

    function volverInicio() {
        window.speechSynthesis.cancel();
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('screen-selector').classList.remove('hidden');
    }
</script>

</body>
</html>
